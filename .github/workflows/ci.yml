name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }} · py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (zero runtime deps) + pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Selftest (invariants + smoke, no real data)
        run: python -m claudeinsights selftest

      - name: Unit + integration tests
        run: python -m pytest -q

      - name: Build the demo dashboard end-to-end
        run: |
          python examples/generate_sample.py
          python -m claudeinsights dashboard --logs examples/sample-logs -o demo.html
          python -m claudeinsights report --no-color --logs examples/sample-logs
